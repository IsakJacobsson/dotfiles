# Reload the confix with Prefix r
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Set Ctrl a as Prefix
set -g prefix C-s

# Make sure oh-my-zsh color themes work correctly
set -g default-terminal "screen-256color"

# For better navigation
setw -g mode-keys vi

# Use system clipboard
#set-option -g set-clipboard on

# Add vim key bindings
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resizing
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when a window is closed
set -g renumber-windows on

# Open new panes in same dir
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Jaco theme colors
jaco_black="#000000"
jaco_bright_black="#929c98"
jaco_green="#008b17"
jaco_bright_green="#bed8cd"

# Tokyonight theme colors
tokyonight_black="#15161e"
tokyonight_bright_black="#292e42"
tokyonight_blue="#7aa2f7"
tokyonight_text_color="#a7b1d9"

# Colors
status_bar_bg="default" # Transparent feel
active_text_color=$jaco_bright_green
inactive_text_color=$jaco_black
active_bg_color=$jaco_green
inactive_bg_color=$jaco_bright_green

# Nerd chars
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"

# Set style for status bar
set -g status-style "bg=#{status_bar_bg},fg=#{inactive_text_color}"

# Highlight the current window tab
set -g window-status-current-format "\
#[fg=${active_bg_color},bg=${status_bar_bg}]${HALF_ROUND_OPEN}\
#[fg=${inactive_text_color},bg=${active_bg_color}]#I:#W\
#[fg=${active_bg_color},bg=${status_bar_bg}]${HALF_ROUND_CLOSE}\
"

# Style non-current window tab
set -g window-status-format "\
#[fg=${inactive_bg_color},bg=${status_bar_bg}]${HALF_ROUND_OPEN}\
#[fg=default,bg=${inactive_bg_color}]#I:#W\
#[fg=${inactive_bg_color},bg=${status_bar_bg}]${HALF_ROUND_CLOSE}\
"

# Simple formats
# set -g window-status-current-format "#[fg=${active_bg_color},bold][#I:#W]"
# set -g window-status-format "[#I:#W]"

# Only show the host in the status line
set -g status-left " "
set -g status-right "\
#[fg=${inactive_bg_color},bg=${status_bar_bg}]${HALF_ROUND_OPEN}\
#[fg=default,bg=${inactive_bg_color}]#H\
#[fg=${inactive_bg_color},bg=${status_bar_bg}]${HALF_ROUND_CLOSE}\
"

# Ensure that everything on the right side of the status line
# is included
set -g status-right-length 100

# Set color of pane borders
set -g pane-border-style fg=$inactive_bg_color
set -g pane-active-border-style fg=$active_bg_color
